services:
  postgres:
    image: postgres:16-alpine
    container_name: sap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sap_warehouse
    ports:
      - "5432:5432"
    volumes:
      - sap_postgres_data:/var/lib/postgresql/data

volumes:
  sap_postgres_data:
